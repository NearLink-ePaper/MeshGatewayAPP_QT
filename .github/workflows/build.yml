name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  QT_VERSION: '6.8.2'
  BUILD_TYPE: Release

jobs:
  # ═══════════════════════════════════════════════════════════
  #  Windows — MSVC x64
  # ═══════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Windows MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtconnectivity
          cache: true

      - name: Generate app icon (.ico)
        run: magick Qt/resource/img/icon.png -define icon:auto-resize=256,128,64,48,32,16 Windows/icon.ico
        shell: bash

      - name: Configure CMake
        run: >
          cmake -B build -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package
        run: |
          mkdir -p artifact
          cp build/${{ env.BUILD_TYPE }}/NearLink_Mesh.exe artifact/
          cd artifact
          windeployqt --release --no-translations NearLink_Mesh.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-windows-x64
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  Linux — x64
  # ═══════════════════════════════════════════════════════════
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglib2.0-dev \
            libbluetooth-dev libdbus-1-dev \
            libxkbcommon-dev libxcb-xkb-dev \
            libfuse2

      - name: Install Qt (Linux)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtconnectivity
          cache: true

      - name: Configure & Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package (AppImage)
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/NearLink_Mesh AppDir/usr/bin/
          cp Qt/resource/img/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/nearlink-mesh.png

          cat > AppDir/usr/share/applications/nearlink-mesh.desktop << 'EOF'
          [Desktop Entry]
          Name=星闪智能网关
          Exec=NearLink_Mesh
          Icon=nearlink-mesh
          Type=Application
          Categories=Utility;
          EOF

          # Download linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          ./linuxdeployqt AppDir/usr/share/applications/nearlink-mesh.desktop -appimage -extra-plugins=bluetooth || true

          mkdir -p artifact
          cp NearLink_Mesh*.AppImage artifact/ 2>/dev/null || cp build/NearLink_Mesh artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-linux-x64
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  macOS — Universal (Intel + Apple Silicon)
  # ═══════════════════════════════════════════════════════════
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (macOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtconnectivity
          cache: true

      - name: Generate app icon (.icns)
        run: |
          ICONSET=MacOS/icon.iconset
          mkdir -p "$ICONSET"
          SRC=Qt/resource/img/icon.png
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz "$SRC" --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
            dbl=$((sz * 2))
            sips -z $dbl $dbl "$SRC" --out "$ICONSET/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o MacOS/icon.icns
          rm -rf "$ICONSET"

      - name: Configure & Build (Universal)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package (.dmg)
        run: |
          cd build
          macdeployqt NearLink_Mesh.app -dmg || true
          mkdir -p ../artifact
          cp NearLink_Mesh.dmg ../artifact/ 2>/dev/null || cp -r NearLink_Mesh.app ../artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-macos-universal
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  iOS — arm64
  # ═══════════════════════════════════════════════════════════
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: ios
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true
          set-env: false

      - name: Generate app icon (1024x1024)
        run: sips -z 1024 1024 Qt/resource/img/icon.png --out IOS/Assets.xcassets/AppIcon.appiconset/icon_1024.png

      - name: Configure & Build
        run: |
          QT_IOS=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/ios
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/macos

          cmake -B build -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE=$QT_IOS/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

          cmake --build build --config ${{ env.BUILD_TYPE }} -- \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO

      - name: Package (.ipa)
        run: |
          mkdir -p artifact

          # Locate the .app bundle (Xcode output path varies)
          APP_PATH=$(find build -path "*/Release-iphoneos/NearLink_Mesh.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "NearLink_Mesh.app" -type d | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            # IPA structure: zip root must contain Payload/AppName.app
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r artifact/NearLink_Mesh-unsigned.ipa Payload
            rm -rf Payload
          else
            echo "WARNING: .app bundle not found, listing build directory:"
            find build -name "*.app" -type d
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-ios-arm64
          path: artifact/NearLink_Mesh-unsigned.ipa

  # ═══════════════════════════════════════════════════════════
  #  Android — arm64-v8a
  # ═══════════════════════════════════════════════════════════
  android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (Android arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          set-env: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-arm64-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-android-arm64-

      - name: Configure & Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          QT_ANDROID=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/android_arm64_v8a
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64

          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ANDROID/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared

          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build APK
        run: |
          cmake --build build --target apk --config ${{ env.BUILD_TYPE }}

          mkdir -p artifact
          APK=$(find build -name "*.apk" -not -name "*debug*" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" artifact/NearLink_Mesh-arm64-v8a.apk
          else
            echo "ERROR: APK not found" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-android-arm64
          path: artifact/NearLink_Mesh-arm64-v8a.apk

  # ═══════════════════════════════════════════════════════════
  #  Android — x86_64 (模拟器)
  # ═══════════════════════════════════════════════════════════
  android-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (Android x86_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_x86_64
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          set-env: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-x86_64-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-android-x86_64-

      - name: Configure & Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          QT_ANDROID=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/android_x86_64
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64

          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ANDROID/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared

          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build APK
        run: |
          cmake --build build --target apk --config ${{ env.BUILD_TYPE }}

          mkdir -p artifact
          APK=$(find build -name "*.apk" -not -name "*debug*" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" artifact/NearLink_Mesh-x86_64.apk
          else
            echo "ERROR: APK not found" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-android-x86_64
          path: artifact/NearLink_Mesh-x86_64.apk

  # ═══════════════════════════════════════════════════════════
  #  Harmony — OpenHarmony arm64-v8a (Windows 交叉编译)
  #  参考: https://wiki.qt.io/Qt_for_HarmonyOS/zh
  # ═══════════════════════════════════════════════════════════
  # 需要在仓库 Settings → Secrets and variables → Actions → Variables 中配置:
  #   OHOS_SDK_URL   — OHOS SDK native 包下载链接 (.zip)
  #   QT_OHOS_URL    — 预编译 Qt 5.12.12 for OHOS 下载链接 (.zip)
  #   MINGW_URL      — llvm-mingw 工具链下载链接 (.zip)
  #                    默认: https://github.com/mstorsjo/llvm-mingw/releases/download/20230919/llvm-mingw-20230919-ucrt-x86_64.zip
  harmony:
    runs-on: windows-latest
    if: vars.OHOS_SDK_URL != '' && vars.QT_OHOS_URL != ''
    env:
      MINGW_DEFAULT_URL: https://github.com/mstorsjo/llvm-mingw/releases/download/20230919/llvm-mingw-20230919-ucrt-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Download & extract llvm-mingw
        shell: pwsh
        run: |
          $url = if ("${{ vars.MINGW_URL }}") { "${{ vars.MINGW_URL }}" } else { "$env:MINGW_DEFAULT_URL" }
          $zip = "$env:RUNNER_TEMP\llvm-mingw.zip"
          Write-Host "Downloading llvm-mingw from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\mingw" -Force
          # 定位 bin\mingw32-make.exe
          $makeExe = Get-ChildItem -Path "$env:RUNNER_TEMP\mingw" -Recurse -Filter "mingw32-make.exe" | Select-Object -First 1
          if ($makeExe) {
            $mingwBin = $makeExe.DirectoryName
            Write-Host "MINGW_BIN=$mingwBin"
            echo "MINGW_BIN=$mingwBin" >> $env:GITHUB_ENV
            echo "$mingwBin" >> $env:GITHUB_PATH
          } else {
            Write-Host "::error::mingw32-make.exe not found in llvm-mingw archive"
            exit 1
          }

      - name: Download & extract OHOS SDK
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\ohos-sdk.zip"
          Write-Host "Downloading OHOS SDK..."
          Invoke-WebRequest -Uri "${{ vars.OHOS_SDK_URL }}" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ohos-sdk" -Force
          # 定位 native 目录 (包含 llvm/ 和 sysroot/)
          $nativeDir = Get-ChildItem -Path "$env:RUNNER_TEMP\ohos-sdk" -Recurse -Directory -Filter "native" | Select-Object -First 1
          if ($nativeDir) {
            $sdk = $nativeDir.FullName
            Write-Host "NATIVE_OHOS_SDK=$sdk"
            echo "NATIVE_OHOS_SDK=$sdk" >> $env:GITHUB_ENV
            echo "OHOS_SDK_SYSROOT=$sdk\sysroot" >> $env:GITHUB_ENV
            echo "LLVM_INSTALL_DIR=$sdk\llvm" >> $env:GITHUB_ENV
          } else {
            Write-Host "::error::OHOS SDK native directory not found"
            exit 1
          }

      - name: Download & extract Qt 5.12.12 for OHOS
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\qt-ohos.zip"
          Write-Host "Downloading Qt for OHOS..."
          Invoke-WebRequest -Uri "${{ vars.QT_OHOS_URL }}" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\qt-ohos" -Force
          # 定位 Qt 安装路径 (包含 bin/qmake 或 lib/)
          $qmake = Get-ChildItem -Path "$env:RUNNER_TEMP\qt-ohos" -Recurse -Filter "qmake.exe" | Select-Object -First 1
          if ($qmake) {
            $qtRoot = $qmake.Directory.Parent.FullName
          } else {
            $libDir = Get-ChildItem -Path "$env:RUNNER_TEMP\qt-ohos" -Recurse -Directory -Filter "lib" | Select-Object -First 1
            if ($libDir) { $qtRoot = $libDir.Parent.FullName }
            else         { $qtRoot = "$env:RUNNER_TEMP\qt-ohos" }
          }
          Write-Host "QT_OHOS_DIR=$qtRoot"
          echo "QT_OHOS_DIR=$qtRoot" >> $env:GITHUB_ENV

      - name: Configure CMake (OHOS cross-compile)
        shell: cmd
        run: |
          cmake -B build -G "MinGW Makefiles" ^
            -DCMAKE_C_COMPILER=%LLVM_INSTALL_DIR%\bin\clang.exe ^
            -DCMAKE_CXX_COMPILER=%LLVM_INSTALL_DIR%\bin\clang++.exe ^
            -DCMAKE_SYSROOT=%OHOS_SDK_SYSROOT% ^
            -DCMAKE_PREFIX_PATH=%QT_OHOS_DIR% ^
            -DCMAKE_FIND_ROOT_PATH=%QT_OHOS_DIR% ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DOHOS=ON ^
            -DOHOS_ARCH=arm64-v8a

      - name: Build
        shell: cmd
        run: mingw32-make -C build -j%NUMBER_OF_PROCESSORS%

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $so = Get-ChildItem -Path build -Recurse -Filter "libNearLink_Mesh.so" | Select-Object -First 1
          if ($so) {
            Copy-Item $so.FullName -Destination artifact\
            Write-Host "Packaged: $($so.FullName)"
          } else {
            Write-Host "::error::libNearLink_Mesh.so not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-harmony-arm64
          path: artifact/libNearLink_Mesh.so

  # ═══════════════════════════════════════════════════════════
  #  Release — 自动发布 (仅 tag 触发)
  # ═══════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ windows, linux, macos, ios, android-arm64, android-x86_64 ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package artifacts
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            (cd "$dir" && zip -r "../${name}.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
