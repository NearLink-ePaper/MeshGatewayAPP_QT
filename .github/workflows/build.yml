name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  QT_VERSION: '6.8.2'
  BUILD_TYPE: Release

jobs:
  # ═══════════════════════════════════════════════════════════
  #  Windows — MSVC x64
  # ═══════════════════════════════════════════════════════════
  Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Windows MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtconnectivity
          cache: true

      - name: Generate app icon (.ico)
        run: magick Qt/resource/img/icon.png -define icon:auto-resize=256,128,64,48,32,16 Windows/icon.ico
        shell: bash

      - name: Configure CMake
        run: >
          cmake -B build -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package
        run: |
          mkdir -p artifact
          cp build/${{ env.BUILD_TYPE }}/NearLink_Mesh.exe artifact/
          cd artifact
          windeployqt --release --no-translations NearLink_Mesh.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-windows-x64
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  Linux — x64
  # ═══════════════════════════════════════════════════════════
  Linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libglib2.0-dev \
            libbluetooth-dev libdbus-1-dev \
            libxkbcommon-dev libxcb-xkb-dev \
            libfuse2

      - name: Install Qt (Linux)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtconnectivity
          cache: true

      - name: Configure & Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package (AppImage)
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/NearLink_Mesh AppDir/usr/bin/
          cp Qt/resource/img/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/nearlink-mesh.png

          cat > AppDir/usr/share/applications/nearlink-mesh.desktop << 'EOF'
          [Desktop Entry]
          Name=星闪智能网关
          Exec=NearLink_Mesh
          Icon=nearlink-mesh
          Type=Application
          Categories=Utility;
          EOF

          # Download linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          ./linuxdeployqt AppDir/usr/share/applications/nearlink-mesh.desktop -appimage -extra-plugins=bluetooth || true

          mkdir -p artifact
          cp NearLink_Mesh*.AppImage artifact/ 2>/dev/null || cp build/NearLink_Mesh artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-linux-x64
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  macOS — Universal (Intel + Apple Silicon)
  # ═══════════════════════════════════════════════════════════
  macOS:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (macOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtconnectivity
          cache: true

      - name: Generate app icon (.icns)
        run: |
          ICONSET=MacOS/icon.iconset
          mkdir -p "$ICONSET"
          SRC=Qt/resource/img/icon.png
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz "$SRC" --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
            dbl=$((sz * 2))
            sips -z $dbl $dbl "$SRC" --out "$ICONSET/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o MacOS/icon.icns
          rm -rf "$ICONSET"

      - name: Configure & Build (Universal)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package (.dmg)
        run: |
          cd build
          macdeployqt NearLink_Mesh.app -dmg || true
          mkdir -p ../artifact
          cp NearLink_Mesh.dmg ../artifact/ 2>/dev/null || cp -r NearLink_Mesh.app ../artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-macos-universal
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  iOS — arm64
  # ═══════════════════════════════════════════════════════════
  iOS:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: ios
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtconnectivity
          cache: true
          set-env: false

      - name: Configure & Build
        run: |
          QT_IOS=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/ios
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/macos

          cmake -B build -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE=$QT_IOS/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

          cmake --build build --config ${{ env.BUILD_TYPE }} -- \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO

      - name: Package (.ipa)
        run: |
          mkdir -p artifact

          # Locate the .app bundle (Xcode output path varies)
          APP_PATH=$(find build -path "*/Release-iphoneos/NearLink_Mesh.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "NearLink_Mesh.app" -type d | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            # IPA structure: zip root must contain Payload/AppName.app
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r artifact/NearLink_Mesh-unsigned.ipa Payload
            rm -rf Payload
          else
            echo "WARNING: .app bundle not found, listing build directory:"
            find build -name "*.app" -type d
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-ios-arm64
          path: artifact/NearLink_Mesh-unsigned.ipa

  # ═══════════════════════════════════════════════════════════
  #  Android — arm64-v8a
  # ═══════════════════════════════════════════════════════════
  Android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (Android arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtconnectivity
          cache: true
          set-env: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-arm64-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-android-arm64-

      - name: Configure & Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          QT_ANDROID=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/android_arm64_v8a
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64

          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ANDROID/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared

          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build APK
        run: |
          cmake --build build --target apk --config ${{ env.BUILD_TYPE }}

          mkdir -p artifact
          APK=$(find build -name "*.apk" -not -name "*debug*" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" artifact/NearLink_Mesh-arm64-v8a.apk
          else
            echo "ERROR: APK not found" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-android-arm64
          path: artifact/NearLink_Mesh-arm64-v8a.apk

  # ═══════════════════════════════════════════════════════════
  #  Android — x86_64 (模拟器)
  # ═══════════════════════════════════════════════════════════
  Android-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (Android x86_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_x86_64
          modules: qtconnectivity
          cache: true

      - name: Install Qt (Host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtconnectivity
          cache: true
          set-env: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-x86_64-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-android-x86_64-

      - name: Configure & Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          QT_ANDROID=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/android_x86_64
          QT_HOST_PATH=${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64

          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ANDROID/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared

          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build APK
        run: |
          cmake --build build --target apk --config ${{ env.BUILD_TYPE }}

          mkdir -p artifact
          APK=$(find build -name "*.apk" -not -name "*debug*" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" artifact/NearLink_Mesh-x86_64.apk
          else
            echo "ERROR: APK not found" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-android-x86_64
          path: artifact/NearLink_Mesh-x86_64.apk

  # ═══════════════════════════════════════════════════════════
  #  HarmonyOS — OpenHarmony arm64-v8a
  #  从源码编译 Qt 库 + 交叉编译应用
  #  Qt 源码: https://gitcode.com/openharmony-sig/qt
  #  参考: https://wiki.qt.io/Building_Qt_for_OpenHarmony
  # ═══════════════════════════════════════════════════════════
  # 可选变量:
  #   QT_OHOS_REPO   — Qt for OHOS 源码仓库 (默认 gitcode.com/openharmony-sig/qt)
  #   QT_OHOS_BRANCH — 源码分支 (默认 dev)
  HarmonyOS:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      OHOS_ARCH: arm64-v8a
      OHOS_SDK_URL: https://github.com/NearLink-ePaper/ohos-sdk/releases/download/6.0-Release/native-linux-x64-6.0.0.47-Beta1.tar.xz
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl python3 gperf bison flex \
            libgl1-mesa-dev libglib2.0-dev \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev

      - name: Cache OHOS SDK
        id: ohos-sdk-cache
        uses: actions/cache@v4
        with:
          path: /opt/ohos-sdk
          key: ohos-sdk-${{ env.OHOS_ARCH }}-6.0-Release-v3

      - name: Download & extract OHOS SDK
        if: steps.ohos-sdk-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ env.OHOS_SDK_URL }}" -O /tmp/ohos-sdk.tar.xz
          sudo mkdir -p /opt/ohos-sdk
          # 解压后直接是 native/ 文件夹
          tar -xJf /tmp/ohos-sdk.tar.xz -C /opt/ohos-sdk
          rm /tmp/ohos-sdk.tar.xz

          # 验证
          if [ ! -d /opt/ohos-sdk/native/llvm/bin ]; then
            echo "::error::SDK structure unexpected"
            ls -la /opt/ohos-sdk/ && ls -la /opt/ohos-sdk/native/ 2>/dev/null || true
            exit 1
          fi
          echo "OK: /opt/ohos-sdk/native/llvm/bin exists"

      - name: Set OHOS SDK environment
        run: |
          echo "OHOS_SDK_PATH=/opt/ohos-sdk"                    >> $GITHUB_ENV
          echo "NATIVE_OHOS_SDK=/opt/ohos-sdk/native"            >> $GITHUB_ENV
          echo "OHOS_SDK_SYSROOT=/opt/ohos-sdk/native/sysroot"   >> $GITHUB_ENV
          echo "LLVM_INSTALL_DIR=/opt/ohos-sdk/native/llvm"      >> $GITHUB_ENV
          echo "/opt/ohos-sdk/native/llvm/bin" >> $GITHUB_PATH

      # ── 编译 Qt 库 (使用 build-qt 一键脚本, 带缓存) ─────
      - name: Cache Qt OHOS library
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: /opt/qt-ohos
          key: qt-ohos-${{ env.OHOS_ARCH }}-6.5.6-buildqt-v1

      - name: Build Qt for OHOS (via build-qt)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        env:
          OHOS_SDK_PATH: /opt/ohos-sdk
        run: |
          # 1) 克隆 build-qt 脚本仓库
          git clone --depth 1 https://github.com/liys-online/build-qt.git /tmp/build-qt

          # 2) 安装 Python 依赖
          pip install -r /tmp/build-qt/requirements.txt

          # 3) 创建 configure.json.user (CI 非交互模式)
          JOBS=$(nproc)
          cat > /tmp/build-qt/configure.json.user << EOCFG
          {
            "config": {
              "working_dir": "/tmp/build-qt/work",
              "ohos_sdk": "/opt/ohos-sdk",
              "ohos_version": 15,
              "build_type": "release",
              "build_ohos_abi": "arm64-v8a",
              "build_qt_tag": "v6.5.6-lts-lgpl",
              "build_ohqt_tag": "master",
              "clone_depth": 1,
              "jobs": $JOBS,
              "verbose": false
            }
          }
          EOCFG

          echo "=== configure.json.user ==="
          cat /tmp/build-qt/configure.json.user

          # 4) 初始化: 克隆 Qt 源码 + 应用补丁
          cd /tmp/build-qt
          python build-qt-ohos.py --init --use_github

          # 5) 构建: configure + build + install (Qt6 会自动先编译 host 再交叉编译)
          python build-qt-ohos.py --exe_stage all --use_github

          # 7) 复制到缓存路径
          QT_OUTPUT=$(find /tmp/build-qt/work/output -maxdepth 1 -type d -name "Qt6.5*" | head -1)
          if [ -z "$QT_OUTPUT" ]; then
            echo "::error::Qt build output not found"
            ls -la /tmp/build-qt/work/output/ 2>/dev/null || echo "output dir missing"
            exit 1
          fi
          echo "Qt installed at: $QT_OUTPUT"
          sudo mkdir -p /opt/qt-ohos
          sudo cp -a "$QT_OUTPUT"/. /opt/qt-ohos/

          # 清理构建目录 (节省磁盘)
          rm -rf /tmp/build-qt

      # ── 编译应用 ────────────────────────────────────────────
      - name: Configure & Build App
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=$LLVM_INSTALL_DIR/bin/clang \
            -DCMAKE_CXX_COMPILER=$LLVM_INSTALL_DIR/bin/clang++ \
            -DCMAKE_SYSROOT=$OHOS_SDK_SYSROOT \
            -DCMAKE_PREFIX_PATH=/opt/qt-ohos \
            -DCMAKE_FIND_ROOT_PATH=/opt/qt-ohos \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DOHOS=ON \
            -DOHOS_ARCH=${{ env.OHOS_ARCH }}

          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package
        run: |
          mkdir -p artifact

          # 应用共享库
          SO=$(find build -name "libNearLink_Mesh.so" | head -1)
          if [ -n "$SO" ]; then
            cp "$SO" artifact/
          else
            echo "::error::libNearLink_Mesh.so not found" && exit 1
          fi

          # 打包 Qt 运行时库 (部署到 DevEco 工程时需要)
          for lib in libQt6Core.so libQt6Gui.so libQt6Widgets.so \
                     libQt6Bluetooth.so libQt6Network.so; do
            [ -f "/opt/qt-ohos/lib/$lib" ] && cp "/opt/qt-ohos/lib/$lib" artifact/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearLink_Mesh-harmony-arm64
          path: artifact/

  # ═══════════════════════════════════════════════════════════
  #  Release — 自动发布 (仅 tag 触发)
  # ═══════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ Windows, Linux, macOS, iOS, Android-arm64, Android-x86_64, HarmonyOS ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package artifacts
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            (cd "$dir" && zip -r "../${name}.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
